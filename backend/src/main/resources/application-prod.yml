spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://150.158.76.53:3306/plant_care_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:plant}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod}
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 604800
  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://emqx:1883}
    client-id: ${MQTT_CLIENT_ID:plantcloud-backend}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    subscribe-topic: ${MQTT_SUBSCRIBE_TOPIC:device/+/sc2/alert}
    qos: ${MQTT_QOS:1}
    automatic-reconnect: ${MQTT_AUTOMATIC_RECONNECT:true}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:plantcloud}
