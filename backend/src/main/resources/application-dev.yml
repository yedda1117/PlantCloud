spring:
  datasource:
    url: jdbc:mysql://150.158.76.53:3306/plant_care_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: plant
    password: 123456
    hikari:
      pool-name: PlantCloudHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000
      leak-detection-threshold: 20000
      register-mbeans: true
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: change-me-in-prod-change-me-in-prod
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 604800
  mqtt:
    broker-url: tcp://150.158.76.53:1883
    client-id: plantcloud-backend
    username: plant
    password: 123456
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: plantcloud
  upload:
    dir: uploads
  smartjavaai:
    enabled: true
    instance-seg-model: SEG_YOLOV8N_PYTORCH
    model-path:
    threshold: 0.35
    background-color: "#EEF8E8"
    face:
      enabled: true
      detect-model: RETINA_FACE
      detect-model-path:
      detect-confidence-threshold: 0.5
      rec-model: FACENET_MODEL
      rec-model-path:
      similarity-threshold: 0.85
      sqlite-db-path: data/face.db
      similarity-type: IP

